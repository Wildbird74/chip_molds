repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Run linter
      - id: ruff-check
        name: ruff check
        args: [--fix, --exit-zero]
        files: \.py$
      # Run formatter
      - id: ruff-format
        name: ruff format
        files: \.py$
